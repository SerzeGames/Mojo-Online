<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Mojo — Jeu de Cartes</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0e1a;font-family:system-ui,-apple-system,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
  canvas{display:block;width:100%;height:100%}

  /* === MENU === */
  #menuOverlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:200;background:#0a0e1a}
  #menuOverlay.hidden{display:none}
  .menu{max-width:400px;width:92%;text-align:center;color:#e8e6f0}
  .menu h1{font-size:42px;margin-bottom:6px;background:linear-gradient(135deg,#ffd369,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .menu .subtitle{font-size:14px;opacity:.5;margin-bottom:32px}
  .menu-input{width:100%;padding:14px 18px;font-size:16px;font-family:system-ui,sans-serif;border:2px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(255,255,255,.06);color:#fff;outline:none;margin-bottom:16px;text-align:center}
  .menu-input:focus{border-color:#667eea}
  .menu-input::placeholder{color:rgba(255,255,255,.3)}
  .menu-btn{display:block;width:100%;padding:16px;font-size:16px;font-weight:700;font-family:system-ui,sans-serif;border:none;border-radius:12px;cursor:pointer;margin-bottom:12px;text-transform:uppercase;letter-spacing:1.5px;transition:transform .15s,box-shadow .15s}
  .menu-btn:active{transform:scale(.97)}
  .btn-solo{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
  .btn-multi{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff}
  .btn-create{background:linear-gradient(135deg,#4ade80,#22c55e);color:#fff}
  .btn-join{background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff}
  .btn-quick{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1e35}
  .btn-back{background:rgba(255,255,255,.08);color:#fff;font-size:13px;padding:12px}
  .btn-copy{background:rgba(255,255,255,.1);color:#ffd369;padding:10px 20px;font-size:13px;border-radius:8px;border:1px solid rgba(255,211,105,.3);cursor:pointer}

  .room-code{font-size:36px;font-weight:700;letter-spacing:6px;color:#ffd369;margin:16px 0;font-family:monospace}
  .status-text{font-size:14px;opacity:.7;margin:12px 0;min-height:20px}
  .menu-section{display:none}
  .menu-section.active{display:block}

  /* Score overlay */
  .overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:100;background:rgba(6,8,18,.94)}
  .overlay.show{display:flex}
  .modal{background:linear-gradient(135deg,#1a1e35,#252a48);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:28px 20px;max-width:400px;width:92%;color:#e8e6f0;text-align:center}
  .modal h2{font-size:22px;font-weight:700;margin-bottom:8px;color:#ffd369}
  .modal p{font-size:15px;opacity:.8;margin-bottom:16px;line-height:1.4}
  .modal table{width:100%;border-collapse:collapse;margin:12px 0}
  .modal th,.modal td{padding:8px 6px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px}
  .modal th{color:#ffd369;font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:11px}
  .modal .mojo-holder{color:#ffd369}
  .btn{display:inline-block;padding:14px 36px;font-family:system-ui,sans-serif;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
  .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
  .mini-cards{display:flex;gap:3px;justify-content:center;margin:4px 0}
  .mini-card-box{width:22px;height:28px;border-radius:3px;border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700}

  @keyframes dots{0%,20%{content:''}40%{content:'.'}60%{content:'..'}80%,100%{content:'...'}}
  .waiting::after{animation:dots 1.5s infinite}
</style>
</head>
<body>

<!-- ====== MENU ====== -->
<div id="menuOverlay">
  <div class="menu">
    <h1>🎴 MOJO</h1>
    <div class="subtitle">Jeu de cartes stratégique</div>

    <!-- Section: Main -->
    <div class="menu-section active" id="menuMain">
      <input class="menu-input" id="pseudoInput" type="text" placeholder="Votre pseudo" maxlength="16" autocomplete="off">
      <button class="menu-btn btn-solo" onclick="menu.startSolo()">🎮 Mode Solo</button>
      <button class="menu-btn btn-multi" onclick="menu.showMulti()">🌐 Multijoueur</button>
    </div>

    <!-- Section: Multiplayer choice -->
    <div class="menu-section" id="menuMulti">
      <button class="menu-btn btn-quick" onclick="menu.quickMatch()">⚡ Recherche rapide</button>
      <button class="menu-btn btn-create" onclick="menu.createRoom()">Créer une partie</button>
      <button class="menu-btn btn-join" onclick="menu.showJoin()">Rejoindre une partie</button>
      <button class="menu-btn btn-back" onclick="menu.showMain()">← Retour</button>
    </div>

    <!-- Section: Quick match (waiting) -->
    <div class="menu-section" id="menuQuick">
      <div style="font-size:40px;margin-bottom:12px">⚡</div>
      <div class="status-text waiting" id="quickStatus">Recherche d'un adversaire</div>
      <div style="font-size:12px;opacity:.4;margin:12px 0" id="quickDetail"></div>
      <button class="menu-btn btn-back" onclick="menu.cancelQuick()">← Annuler</button>
    </div>

    <!-- Section: Create room (waiting) -->
    <div class="menu-section" id="menuCreate">
      <p>Partagez ce code à votre adversaire :</p>
      <div class="room-code" id="roomCode">----</div>
      <button class="btn-copy" id="btnCopy" onclick="menu.copyCode()">📋 Copier le code</button>
      <div class="status-text waiting" id="createStatus">En attente d'un joueur</div>
      <button class="menu-btn btn-back" onclick="menu.cancelRoom()">← Annuler</button>
    </div>

    <!-- Section: Join room -->
    <div class="menu-section" id="menuJoin">
      <input class="menu-input" id="joinCodeInput" type="text" placeholder="Code de la partie" maxlength="6" autocomplete="off" style="text-transform:uppercase;letter-spacing:4px;font-size:20px">
      <button class="menu-btn btn-join" onclick="menu.joinRoom()">Rejoindre</button>
      <div class="status-text" id="joinStatus"></div>
      <button class="menu-btn btn-back" onclick="menu.showMulti()">← Retour</button>
    </div>
  </div>
</div>

<!-- ====== GAME CANVAS ====== -->
<canvas id="gameCanvas"></canvas>

<!-- Score overlay -->
<div class="overlay" id="scoreOverlay">
  <div class="modal" id="scoreModal"></div>
</div>

<script>
// ==================================================================
// SPRITE
// ==================================================================
const SPRITE_SHEET_SRC = ''; // ← votre base64

// ==================================================================
// MENU CONTROLLER
// ==================================================================
class MenuController {
  constructor() {
    this.peer = null;
    this.conn = null;
    this.isHost = false;
    this.roomId = null;
    this.pseudo = '';
    this.remotePseudo = '';
  }

  showSection(id) {
    document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  showMain() { this.showSection('menuMain'); this.destroyPeer(); }
  showMulti() { this.showSection('menuMulti'); }
  showJoin() { this.showSection('menuJoin'); document.getElementById('joinStatus').textContent = ''; }

  getPseudo() {
    let p = document.getElementById('pseudoInput').value.trim();
    if (!p) p = 'Joueur ' + Math.floor(Math.random()*999);
    this.pseudo = p;
    return p;
  }

  // === SOLO ===
  startSolo() {
    this.getPseudo();
    document.getElementById('menuOverlay').classList.add('hidden');
    game.mode = 'solo';
    game.playerNames = [this.pseudo, 'Ordinateur'];
    game.newGame();
  }

  // === CREATE ROOM ===
  async createRoom() {
    this.getPseudo();
    this.showSection('menuCreate');
    this.isHost = true;

    // Generate room code
    this.roomId = 'MOJO' + Math.random().toString(36).substring(2, 6).toUpperCase();
    document.getElementById('roomCode').textContent = this.roomId;
    document.getElementById('createStatus').textContent = 'En attente d\'un joueur';

    try {
      this.peer = new Peer(this.roomId, { debug: 0 });

      this.peer.on('open', () => {
        document.getElementById('createStatus').textContent = 'En attente d\'un joueur...';
      });

      this.peer.on('connection', (conn) => {
        this.conn = conn;
        this.setupConnection();
      });

      this.peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
          // Room code taken, retry
          this.roomId = 'MOJO' + Math.random().toString(36).substring(2, 6).toUpperCase();
          document.getElementById('roomCode').textContent = this.roomId;
          this.peer.destroy();
          this.createRoom();
        } else {
          document.getElementById('createStatus').textContent = '❌ Erreur: ' + err.type;
        }
      });
    } catch(e) {
      document.getElementById('createStatus').textContent = '❌ Erreur de connexion';
    }
  }

  // === JOIN ROOM ===
  async joinRoom() {
    this.getPseudo();
    const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
    if (!code) { document.getElementById('joinStatus').textContent = 'Entrez un code'; return; }

    this.isHost = false;
    this.roomId = code;
    document.getElementById('joinStatus').textContent = 'Connexion...';

    try {
      this.peer = new Peer(null, { debug: 0 });

      this.peer.on('open', () => {
        this.conn = this.peer.connect(code, { reliable: true });
        this.conn.on('open', () => this.setupConnection());
        this.conn.on('error', () => {
          document.getElementById('joinStatus').textContent = '❌ Partie introuvable';
        });
      });

      this.peer.on('error', (err) => {
        document.getElementById('joinStatus').textContent = '❌ ' + (err.type === 'peer-unavailable' ? 'Partie introuvable' : err.type);
      });

      setTimeout(() => {
        if (!this.conn || !this.conn.open) {
          document.getElementById('joinStatus').textContent = '❌ Délai dépassé';
        }
      }, 10000);
    } catch(e) {
      document.getElementById('joinStatus').textContent = '❌ Erreur';
    }
  }

  setupConnection() {
    this.conn.on('open', () => {
      // Exchange pseudos
      this.conn.send({ type: 'pseudo', pseudo: this.pseudo });
    });

    this.conn.on('data', (data) => {
      if (data.type === 'pseudo') {
        this.remotePseudo = data.pseudo;
        // Both connected, start game
        document.getElementById('menuOverlay').classList.add('hidden');
        game.mode = 'multi';
        game.isHost = this.isHost;
        game.conn = this.conn;
        if (this.isHost) {
          game.playerNames = [this.pseudo, this.remotePseudo];
          game.localPlayerIndex = 0;
        } else {
          game.playerNames = [this.remotePseudo, this.pseudo];
          game.localPlayerIndex = 1;
        }
        game.newGame();
      }
      // Game messages
      else if (data.type === 'game') {
        game.onNetworkMessage(data);
      }
    });

    this.conn.on('close', () => {
      if (game.mode === 'multi') {
        game.info('⚠️ Adversaire déconnecté');
        game.isProcessing = true;
        setTimeout(() => {
          document.getElementById('menuOverlay').classList.remove('hidden');
          menu.showMain();
        }, 2000);
      }
    });

    // Send pseudo immediately if connection already open
    if (this.conn.open) {
      this.conn.send({ type: 'pseudo', pseudo: this.pseudo });
    }
  }

  copyCode() {
    navigator.clipboard?.writeText(this.roomId).then(() => {
      document.getElementById('btnCopy').textContent = '✅ Copié !';
      setTimeout(() => document.getElementById('btnCopy').textContent = '📋 Copier le code', 2000);
    });
  }

  cancelRoom() { this.destroyPeer(); this.showMulti(); }

  // === QUICK MATCH ===
  // Uses a pool of lobby IDs. The player tries to JOIN an existing lobby first.
  // If no lobby is available, the player BECOMES the lobby and waits.
  async quickMatch() {
    this.getPseudo();
    this.showSection('menuQuick');
    this.isHost = false;
    this.quickSearching = true;
    document.getElementById('quickStatus').textContent = 'Recherche d\'un adversaire';
    document.getElementById('quickDetail').textContent = '';

    // Try multiple lobby slots to reduce collision
    const lobbyBase = 'MOJOQ';
    const slots = 8; // 8 lobby slots
    let found = false;

    // Phase 1: Try to JOIN one of the lobby slots
    for (let i = 0; i < slots && !found && this.quickSearching; i++) {
      const lobbyId = lobbyBase + i;
      found = await this.tryJoinLobby(lobbyId);
      if (found) return; // Connected!
    }

    if (!this.quickSearching) return; // Cancelled

    // Phase 2: No lobby found, BECOME a lobby
    this.isHost = true;
    document.getElementById('quickStatus').textContent = 'En attente d\'un adversaire';
    document.getElementById('quickDetail').textContent = 'Vous êtes le premier — patience...';

    // Pick a random slot
    const mySlot = lobbyBase + Math.floor(Math.random() * slots);
    this.roomId = mySlot;

    try {
      this.destroyPeer();
      this.peer = new Peer(mySlot, { debug: 0 });

      this.peer.on('open', () => {
        if (!this.quickSearching) { this.destroyPeer(); return; }
        document.getElementById('quickDetail').textContent = 'Lobby ouvert, en attente...';
      });

      this.peer.on('connection', (conn) => {
        if (!this.quickSearching) { conn.close(); return; }
        this.conn = conn;
        this.quickSearching = false;
        document.getElementById('quickStatus').textContent = 'Adversaire trouvé !';
        document.getElementById('quickDetail').textContent = '';
        this.setupConnection();
      });

      this.peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
          // Slot taken, try another
          const alt = lobbyBase + Math.floor(Math.random() * slots);
          this.roomId = alt;
          this.peer.destroy();
          this.peer = new Peer(alt, { debug: 0 });
          this.peer.on('open', () => {
            document.getElementById('quickDetail').textContent = 'Lobby ouvert, en attente...';
          });
          this.peer.on('connection', (conn) => {
            if (!this.quickSearching) { conn.close(); return; }
            this.conn = conn;
            this.quickSearching = false;
            document.getElementById('quickStatus').textContent = 'Adversaire trouvé !';
            this.setupConnection();
          });
        }
      });

      // Timeout: after 60s, retry the whole process
      this.quickTimeout = setTimeout(() => {
        if (this.quickSearching) {
          this.destroyPeer();
          this.quickMatch(); // Retry
        }
      }, 60000);

    } catch(e) {
      document.getElementById('quickStatus').textContent = '❌ Erreur de connexion';
    }
  }

  // Try to connect to a lobby slot. Returns true if connected.
  tryJoinLobby(lobbyId) {
    return new Promise((resolve) => {
      if (!this.quickSearching) { resolve(false); return; }

      const tempPeer = new Peer(null, { debug: 0 });
      let resolved = false;
      const cleanup = () => { if (!resolved) { resolved = true; try { tempPeer.destroy(); } catch(e){} } };
      
      // Timeout per slot: 1.5s
      const timer = setTimeout(() => { cleanup(); resolve(false); }, 1500);

      tempPeer.on('open', () => {
        if (resolved) return;
        const conn = tempPeer.connect(lobbyId, { reliable: true });
        
        conn.on('open', () => {
          if (resolved) return;
          clearTimeout(timer);
          resolved = true;
          // Success! Transfer this connection
          this.peer = tempPeer;
          this.conn = conn;
          this.isHost = false;
          this.quickSearching = false;
          document.getElementById('quickStatus').textContent = 'Adversaire trouvé !';
          document.getElementById('quickDetail').textContent = '';
          this.setupConnection();
          resolve(true);
        });

        conn.on('error', () => {
          if (!resolved) { clearTimeout(timer); cleanup(); resolve(false); }
        });
      });

      tempPeer.on('error', () => {
        if (!resolved) { clearTimeout(timer); cleanup(); resolve(false); }
      });
    });
  }

  cancelQuick() {
    this.quickSearching = false;
    if (this.quickTimeout) { clearTimeout(this.quickTimeout); this.quickTimeout = null; }
    this.destroyPeer();
    this.showMulti();
  }

  destroyPeer() {
    if (this.conn) { try { this.conn.close(); } catch(e){} this.conn = null; }
    if (this.peer) { try { this.peer.destroy(); } catch(e){} this.peer = null; }
  }
}

const menu = new MenuController();

// ==================================================================
// CONSTANTS
// ==================================================================
const IS_MOBILE = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
const MAX_DPR = IS_MOBILE ? 2 : (window.devicePixelRatio || 1);
const CARD_W = IS_MOBILE ? 90 : 140, CARD_H = IS_MOBILE ? 108 : 168, CARD_R = IS_MOBILE ? 7 : 10;
const TOUCH_PAD = IS_MOBILE ? 8 : 0;
const SPRITE_COLS = 8, SPRITE_ROWS = 2;
const C = { bg1:'#0a0e1a',bg2:'#141929',accent:'#ffd369',accent2:'#ff6b6b',green:'#4ade80',blue:'#60a5fa',cardBack:'#1e2340',cardBorder:'#2a3060',text:'#e8e6f0',textDim:'#7a7e96',overlay:'rgba(255,255,255,0.04)',selectable:'rgba(74,222,128,0.35)' };
const CARD_MAP = {'blue-0':{col:3,row:0},'blue-1':{col:4,row:0},'green-2':{col:5,row:0},'green-3':{col:6,row:0},'green-4':{col:7,row:0},'yellow-5':{col:0,row:1},'yellow-6':{col:1,row:1},'yellow-7':{col:2,row:1},'red-8':{col:3,row:1},'red-9':{col:4,row:1},'red-10':{col:5,row:1},'pink-11':{col:6,row:1},'pink-12':{col:7,row:1}};

// ==================================================================
// ENGINE CLASSES (Tween, Particles, SpriteAtlas, CardEntity)
// ==================================================================
const lerp=(a,b,t)=>a+(b-a)*t;
const ease={outCubic:t=>1-(1-t)**3,outBack:t=>{const c=1.70158;return 1+(c+1)*(t-1)**3+c*(t-1)**2;},inOutQuad:t=>t<0.5?2*t*t:1-(-2*t+2)**2/2};

class TweenEngine{constructor(){this.tweens=[];}add(o,p,d,fn=ease.outCubic,dl=0){return new Promise(r=>{const s={};for(const k in p)s[k]=o[k];this.tweens.push({o,s,e:p,d,fn,dl,el:-dl,r});});}update(dt){for(let i=this.tweens.length-1;i>=0;i--){const tw=this.tweens[i];tw.el+=dt;if(tw.el<0)continue;const t=Math.min(tw.el/tw.d,1);const e=tw.fn(t);for(const k in tw.e)tw.o[k]=lerp(tw.s[k],tw.e[k],e);if(t>=1){this.tweens.splice(i,1);tw.r();}}}clear(){this.tweens.forEach(t=>t.r());this.tweens=[];}}

class Particles{constructor(){this.p=[];}emit(x,y,n,color){const c=IS_MOBILE?Math.min(n,4):n;for(let i=0;i<c;i++){const a=Math.random()*Math.PI*2;const spd=60+Math.random()*140;this.p.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:0.4+Math.random()*0.3,maxLife:0.4+Math.random()*0.3,size:IS_MOBILE?1.5+Math.random()*2:2+Math.random()*4,color});}}update(dt){for(let i=this.p.length-1;i>=0;i--){const p=this.p[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=180*dt;p.vx*=0.97;p.vy*=0.97;p.life-=dt;if(p.life<=0)this.p.splice(i,1);}}draw(ctx){for(const p of this.p){const a=Math.max(0,p.life/p.maxLife);ctx.globalAlpha=a;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}}

class SpriteAtlas{constructor(){this.loaded=false;this.img=null;this.sw=0;this.sh=0;}load(src){return new Promise((res,rej)=>{if(!src){res();return;}const img=new Image();img.onload=()=>{this.img=img;this.sw=img.width/SPRITE_COLS;this.sh=img.height/SPRITE_ROWS;this.loaded=true;res();};img.onerror=rej;img.src=src;});}
drawCard(ctx,card,x,y,w,h,faceUp=true,flip=1){const sc=Math.abs(flip);if(sc<0.01)return;ctx.save();ctx.translate(x+w/2,y+h/2);ctx.scale(sc,1);ctx.translate(-w/2,-h/2);this.rr(ctx,0,0,w,h,CARD_R);ctx.clip();const show=faceUp&&flip>0;if(this.loaded&&this.img){if(show){const p=CARD_MAP[`${card.color}-${card.value}`];if(p)ctx.drawImage(this.img,p.col*this.sw,p.row*this.sh,this.sw,this.sh,0,0,w,h);else this.ff(ctx,card,w,h);}else ctx.drawImage(this.img,0,0,this.sw,this.sh,0,0,w,h);}else{if(show)this.ff(ctx,card,w,h);else this.fb(ctx,w,h);}ctx.restore();}
ff(ctx,card,w,h){const cm={blue:'#3b82f6',green:'#22c55e',yellow:'#eab308',red:'#ef4444',pink:'#ec4899'};ctx.fillStyle=cm[card.color]||'#666';ctx.fillRect(0,0,w,h);ctx.fillStyle='#fff';ctx.font=`bold ${h*0.35}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(card.value,w/2,h/2);}
fb(ctx,w,h){ctx.fillStyle=C.cardBack;ctx.fillRect(0,0,w,h);ctx.strokeStyle=C.cardBorder;ctx.lineWidth=2;ctx.strokeRect(6,6,w-12,h-12);ctx.fillStyle=C.accent;ctx.font=`bold ${h*0.22}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('M',w/2,h/2);}
drawMojoFace(ctx,x,y,w,h,pen=false){ctx.save();ctx.translate(x,y);this.rr(ctx,0,0,w,h,CARD_R);ctx.clip();if(this.loaded&&this.img)ctx.drawImage(this.img,(pen?2:1)*this.sw,0,this.sw,this.sh,0,0,w,h);else{ctx.fillStyle=pen?'#ef4444':'#8b5cf6';ctx.fillRect(0,0,w,h);ctx.fillStyle='#fff';ctx.font=`bold ${h*0.25}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(pen?'+10':'MOJO',w/2,h/2);}ctx.restore();}
drawDeckBack(ctx,x,y,w,h){ctx.save();ctx.translate(x,y);this.rr(ctx,0,0,w,h,CARD_R);ctx.clip();if(this.loaded&&this.img)ctx.drawImage(this.img,0,0,this.sw,this.sh,0,0,w,h);else this.fb(ctx,w,h);ctx.restore();}

// ==================================================================
// MAIN GAME (supports both Solo and Multi)

class MojoCanvasGame {

    this.mouseX=0;this.mouseY=0;this.hoveredCard=null;
    this.infoText='';this.buttons=[];this.mojoPhaseText='';this.mojoPhaseAlpha=0;
    this.lastTime=0;this.time=0;

    // Seed for multiplayer sync
    this.rngSeed=0;

    this.initCanvas();
  }

  async initCanvas() {
    this.resize();
    window.addEventListener('resize',()=>this.resize());
    this.canvas.addEventListener('touchstart',e=>{e.preventDefault();this.onTouchStart(e);},{passive:false});
    this.canvas.addEventListener('touchmove',e=>{e.preventDefault();},{passive:false});
    this.canvas.addEventListener('mousemove',e=>this.onMouseMove(e));
    this.canvas.addEventListener('click',e=>this.onClick(e));
    await this.atlas.load(SPRITE_SHEET_SRC);

  }

  // === Seeded RNG for multiplayer sync ===
  seededRandom() {
    this.rngSeed=(this.rngSeed*16807+0)%2147483647;

  }

  resize(){this.dpr=Math.min(window.devicePixelRatio||1,MAX_DPR);this.W=window.innerWidth;this.H=window.innerHeight;this.canvas.width=this.W*this.dpr;this.canvas.height=this.H*this.dpr;this.ctx.setTransform(this.dpr,0,0,this.dpr,0,0);this.recalcLayout();}

  recalcLayout(){const cx=this.W/2,cy=this.H/2;const gap=IS_MOBILE?CARD_W*0.15:CARD_W*0.3;const tw=CARD_W*3+gap*2;const sx=cx-tw/2;this.mojoX=sx;this.mojoY=cy-CARD_H/2;this.deckX=sx+CARD_W+gap;this.deckY=cy-CARD_H/2;this.discardX=sx+(CARD_W+gap)*2;this.discardY=cy-CARD_H/2;this.layoutHand(this.humanCards,this.humanFaceDown,this.H-CARD_H-(IS_MOBILE?52:40));this.layoutHand(this.aiCards,this.aiFaceDown,IS_MOBILE?42:30);}

  layoutHand(cards,fd,baseY){const all=[...fd,...cards];if(!all.length)return;const mW=this.W-(IS_MOBILE?16:80);const gap=Math.min(CARD_W+(IS_MOBILE?4:8),mW/all.length);const sx=(this.W-gap*(all.length-1)-CARD_W)/2;all.forEach((c,i)=>{c.targetX=sx+i*gap;c.targetY=baseY;});}

  setupButtons(){const bw=IS_MOBILE?140:180,bw2=IS_MOBILE?90:120,bh=IS_MOBILE?40:36,g=IS_MOBILE?8:20;
    this.buttons=[
      {id:'newGame',label:'NOUVELLE PARTIE',x:()=>this.W/2-bw-g/2,y:()=>this.H-bh-(IS_MOBILE?8:0),w:bw,h:bh,color:'#667eea',action:()=>this.newGame()},

  // === INPUT ===
  onTouchStart(e){const t=e.touches[0];const r=this.canvas.getBoundingClientRect();this.mouseX=t.clientX-r.left;this.mouseY=t.clientY-r.top;this.handleClick();}
  onMouseMove(e){if(IS_MOBILE)return;const r=this.canvas.getBoundingClientRect();this.mouseX=e.clientX-r.left;this.mouseY=e.clientY-r.top;this.updateHover();}
  onClick(e){const r=this.canvas.getBoundingClientRect();this.mouseX=e.clientX-r.left;this.mouseY=e.clientY-r.top;this.handleClick();}

  updateHover(){this.hoveredCard=null;for(let i=this.humanCards.length-1;i>=0;i--){const c=this.humanCards[i];if(c.selectable&&c.contains(this.mouseX,this.mouseY)){this.hoveredCard=c;return;}}}

  handleClick(){
    for(const btn of this.buttons){const bx=typeof btn.x==='function'?btn.x():btn.x;const by=typeof btn.y==='function'?btn.y():btn.y;const pad=IS_MOBILE?6:0;if(this.mouseX>=bx-pad&&this.mouseX<=bx+btn.w+pad&&this.mouseY>=by-pad&&this.mouseY<=by+btn.h+pad){if(!btn.enabled||btn.enabled()){btn.action();return;}}}

  }

  // === GAME LOOP ===
  gameLoop(ts){const dt=Math.min((ts-this.lastTime)/1000,0.05);this.lastTime=ts;this.time+=dt;this.update(dt);this.draw();requestAnimationFrame(t=>this.gameLoop(t));}

  update(dt){this.tweens.update(dt);this.particles.update(dt);const lf=Math.min(1,dt*(IS_MOBILE?11:14));const sm=a=>{for(const c of a){c.x=lerp(c.x,c.targetX,lf);c.y=lerp(c.y,c.targetY,lf);}};sm(this.humanCards);sm(this.aiCards);sm(this.humanFaceDown);sm(this.aiFaceDown);sm(this.flyingCards);
    if(!IS_MOBILE)for(const c of this.humanCards){const h=c===this.hoveredCard;c.hoverT=lerp(c.hoverT,h?1:0,Math.min(1,dt*12));c.glowAlpha=lerp(c.glowAlpha,(c.selectable?0.3:0)+(h?0.7:0),Math.min(1,dt*10));}
    else for(const c of this.humanCards){c.hoverT=0;c.glowAlpha=lerp(c.glowAlpha,c.selectable?0.25:0,Math.min(1,dt*8));}}

  draw(){const ctx=this.ctx,W=this.W,H=this.H;if(IS_MOBILE){ctx.fillStyle=C.bg1;ctx.fillRect(0,0,W,H);}else{const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,C.bg1);g.addColorStop(1,C.bg2);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
    if(!IS_MOBILE){const czX=this.mojoX-20,czY=this.mojoY-40;ctx.fillStyle=C.overlay;this.atlas.rr(ctx,czX,czY,(this.discardX+CARD_W+20)-czX,CARD_H+80,20);ctx.fill();}
    ctx.fillStyle=C.textDim;ctx.font=`600 ${IS_MOBILE?10:12}px system-ui`;ctx.textAlign='center';ctx.fillText('MOJO',this.mojoX+CARD_W/2,this.mojoY-(IS_MOBILE?8:14));ctx.fillText('PIOCHE',this.deckX+CARD_W/2,this.deckY-(IS_MOBILE?8:14));ctx.fillText('DÉFAUSSE',this.discardX+CARD_W/2,this.discardY-(IS_MOBILE?8:14));
    ctx.save();ctx.globalAlpha=this.mojoAlpha;ctx.translate(this.mojoX+CARD_W/2,this.mojoY+CARD_H/2);ctx.scale(this.mojoScale*this.mojoFlip,this.mojoScale);ctx.translate(-CARD_W/2,-CARD_H/2);this.atlas.drawMojoFace(ctx,0,0,CARD_W,CARD_H,this.mojoPenalty);ctx.restore();
    ctx.fillStyle=C.accent;ctx.font=`700 ${IS_MOBILE?16:24}px system-ui`;ctx.textAlign='center';ctx.fillText(`${this.mojoValue}/2`,this.mojoX+CARD_W/2,this.mojoY+CARD_H+(IS_MOBILE?14:24));
    if(this.deck.length>0){if(!IS_MOBILE)for(let i=2;i>=0;i--){ctx.save();ctx.globalAlpha=0.3;this.atlas.drawDeckBack(ctx,this.deckX+i*2,this.deckY-i*2,CARD_W,CARD_H);ctx.restore();}this.atlas.drawDeckBack(ctx,this.deckX,this.deckY,CARD_W,CARD_H);ctx.fillStyle=C.text;ctx.font=`600 ${IS_MOBILE?11:14}px system-ui`;ctx.textAlign='center';ctx.fillText(`${this.deck.length}`,this.deckX+CARD_W/2,this.deckY+CARD_H+(IS_MOBILE?12:20));}
    if(this.discardEntity){this.discardEntity.x=this.discardX;this.discardEntity.y=this.discardY;this.discardEntity.draw(ctx,this.atlas);}
    for(const c of this.aiFaceDown)c.draw(ctx,this.atlas);for(const c of this.aiCards)c.draw(ctx,this.atlas);for(const c of this.humanFaceDown)c.draw(ctx,this.atlas);for(const c of this.humanCards)c.draw(ctx,this.atlas);for(const c of this.flyingCards)c.draw(ctx,this.atlas);

    this.drawButtons(ctx);}

  drawPlayerInfo(ctx){const W=this.W;const s0=this.totalScores[0]?.total??0,s1=this.totalScores[1]?.total??0;
    ctx.fillStyle=C.text;ctx.font=`600 ${IS_MOBILE?13:16}px system-ui`;ctx.textAlign='left';ctx.fillText(`${this.playerNames[this.localPlayerIndex]}: `,IS_MOBILE?10:20,IS_MOBILE?18:24);ctx.fillStyle=C.accent;ctx.fillText(`${this.localPlayerIndex===0?s0:s1}`,IS_MOBILE?90:120,IS_MOBILE?18:24);
    ctx.fillStyle=C.text;ctx.textAlign='right';const oppIdx=1-this.localPlayerIndex;ctx.fillText(`${this.playerNames[oppIdx]}: `,W-(IS_MOBILE?36:50),IS_MOBILE?18:24);ctx.fillStyle=C.accent;ctx.fillText(`${oppIdx===0?s0:s1}`,W-(IS_MOBILE?10:20),IS_MOBILE?18:24);
    const p=this.players[this.currentPlayerIndex];if(p){const isLocal=this.currentPlayerIndex===this.localPlayerIndex;const iy=isLocal?this.H-CARD_H-(IS_MOBILE?68:72):(IS_MOBILE?38:52);ctx.fillStyle=C.green;ctx.globalAlpha=0.6+Math.sin(this.time*4)*0.3;ctx.font=`600 ${IS_MOBILE?12:14}px system-ui`;ctx.textAlign='center';ctx.fillText(`▸ ${this.playerNames[this.currentPlayerIndex]} ▸`,this.W/2,iy);ctx.globalAlpha=1;}
    ctx.fillStyle=C.textDim;ctx.font=`500 ${IS_MOBILE?11:13}px system-ui`;ctx.textAlign='center';const oppN=this.aiCards.length+this.aiFaceDown.length;ctx.fillText(`${oppN} cartes`,this.W/2,IS_MOBILE?34:58);const myN=this.humanCards.length+this.humanFaceDown.length;ctx.fillText(`${myN} cartes`,this.W/2,this.H-CARD_H-(IS_MOBILE?56:52));}

  drawInfo(ctx){ctx.save();ctx.fillStyle=C.text;ctx.font=`600 ${IS_MOBILE?13:16}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.globalAlpha=0.9;ctx.fillText(this.infoText,this.W/2,this.H/2+CARD_H/2+(IS_MOBILE?28:50));ctx.restore();}

  drawButtons(ctx){for(const btn of this.buttons){const en=!btn.enabled||btn.enabled();const bx=typeof btn.x==='function'?btn.x():btn.x;const by=typeof btn.y==='function'?btn.y():btn.y;ctx.save();ctx.globalAlpha=en?0.9:0.3;ctx.fillStyle=btn.color;this.atlas.rr(ctx,bx,by,btn.w,btn.h,8);ctx.fill();ctx.fillStyle='#fff';ctx.font=`600 ${IS_MOBILE?11:12}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(btn.label,bx+btn.w/2,by+btn.h/2);ctx.restore();}}

  info(m){this.infoText=m;}
  wait(ms){return new Promise(r=>setTimeout(r,ms));}

  // === NETWORK ===
  sendNet(action, data={}){

    }
  }

  onNetworkMessage(msg){
    if(msg.action==='playCard'){
      this.playCard(1-this.localPlayerIndex, msg.cardIndex, true);
    } else if(msg.action==='pass'){
      this.playerPass(true);
    } else if(msg.action==='mojoFlip'){
      // Remote player flipped a mojo card — execute on our side too
      this.handleRemoteMojoFlip(msg.last);
    } else if(msg.action==='newRound'){
      document.getElementById('scoreOverlay').classList.remove('show');
      this.newRoundWithSeed(msg.seed, msg.starter);
    } else if(msg.action==='newGame'){
      document.getElementById('scoreOverlay').classList.remove('show');
      this.totalScores=[];this.roundScores=[];this.mojoHolder=null;
      this.nextRoundStarter=msg.starter||0;
      this.newRoundWithSeed(msg.seed, this.nextRoundStarter);
    }
  }

  async handleRemoteMojoFlip(isLast){
    const pi=1-this.localPlayerIndex;
    const p=this.players[pi];
    this.isProcessing=true;

    await this.revealOneRemote(pi);
    if(isLast){
      p.roundWinner=true;this.hideMojoPhase();
      this.info(`${this.playerNames[pi]} a tout révélé !`);
      await this.wait(600);await this.revealAll(this.localPlayerIndex);
    } else {
      await this.wait(400);this.isProcessing=false;this.nextPlayer();
    }
  }

  // === GAME LOGIC ===
  async newGame(){
    document.getElementById('scoreOverlay').classList.remove('show');
    this.tweens.clear();this.totalScores=[];this.roundScores=[];this.mojoHolder=null;this.nextRoundStarter=0;
    if(this.mode==='multi'&&this.isHost){
      const seed=Math.floor(Math.random()*2147483647);
      this.sendNet('newGame',{seed,starter:0});
      await this.newRoundWithSeed(seed,0);
    } else if(this.mode==='solo'){
      await this.newRoundLocal();
    }
    // If multi guest, wait for host message
  }

  async newRoundLocal(){
    this.tweens.clear();this.endingRound=false;this.isProcessing=true;
    this.currentPlayerIndex=this.nextRoundStarter??0;this.firstMojoPlayer=undefined;
    this.mojoValue=0;this.clockwise=true;this.passedPlayers.clear();
    this.mojoPenalty=false;this.mojoFlip=1;this.mojoScale=1;this.mojoAlpha=1;
    this.mojoPhaseAlpha=0;this.mojoPhaseText='';this.flyingCards=[];

    this.recalcLayout();await this.animateDeal();
    const starter=this.playerNames[this.currentPlayerIndex];
    this.info(this.currentPlayerIndex===this.localPlayerIndex?'C\'est votre tour !':`${starter} commence !`);
    this.isProcessing=false;this.checkTurn();
  }

  async newRoundWithSeed(seed, starter){
    this.rngSeed=seed;this.nextRoundStarter=starter;
    this.tweens.clear();this.endingRound=false;this.isProcessing=true;
    this.currentPlayerIndex=starter;this.firstMojoPlayer=undefined;
    this.mojoValue=0;this.clockwise=true;this.passedPlayers.clear();
    this.mojoPenalty=false;this.mojoFlip=1;this.mojoScale=1;this.mojoAlpha=1;
    this.mojoPhaseAlpha=0;this.mojoPhaseText='';this.flyingCards=[];
    this.humanCards=[];this.aiCards=[];this.humanFaceDown=[];this.aiFaceDown=[];this.discardEntity=null;
    this.initDeckSeeded();this.initPlayers();
    if(this.deck.length>0){const c=this.deck.pop();this.discard.push(c);this.discardEntity=new CardEntity(c,this.discardX,this.discardY);}
    this.recalcLayout();await this.animateDeal();
    this.info(this.currentPlayerIndex===this.localPlayerIndex?'C\'est votre tour !':`${this.playerNames[this.currentPlayerIndex]} commence !`);
    this.isProcessing=false;this.checkTurn();
  }

  initDeck(){this.deck=[];this.discard=[];const B=[{v:0,c:'blue'},{v:1,c:'blue'},{v:2,c:'green'},{v:3,c:'green'},{v:4,c:'green'},{v:5,c:'yellow'},{v:6,c:'yellow'},{v:7,c:'yellow'},{v:8,c:'red'},{v:9,c:'red'},{v:10,c:'red'},{v:11,c:'pink'},{v:12,c:'pink'}];for(let i=0;i<7;i++)this.deck.push(...B.map(b=>({value:b.v,color:b.c})));for(let i=this.deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[this.deck[i],this.deck[j]]=[this.deck[j],this.deck[i]];}}

  initDeckSeeded(){this.deck=[];this.discard=[];const B=[{v:0,c:'blue'},{v:1,c:'blue'},{v:2,c:'green'},{v:3,c:'green'},{v:4,c:'green'},{v:5,c:'yellow'},{v:6,c:'yellow'},{v:7,c:'yellow'},{v:8,c:'red'},{v:9,c:'red'},{v:10,c:'red'},{v:11,c:'pink'},{v:12,c:'pink'}];for(let i=0;i<7;i++)this.deck.push(...B.map(b=>({value:b.v,color:b.c})));for(let i=this.deck.length-1;i>0;i--){const j=Math.floor(this.seededRandom()*(i+1));[this.deck[i],this.deck[j]]=[this.deck[j],this.deck[i]];}}

  initPlayers(){
    this.players=[
      {name:this.playerNames[0],hand:[],isHuman:true,passed:false,faceDownCards:[],inMojoPhase:false},
      {name:this.playerNames[1],hand:[],isHuman:this.mode==='multi',passed:false,faceDownCards:[],inMojoPhase:false}
    ];
  }

  async animateDeal(){const dkR=this.deckX,dkY=this.deckY;for(let r=0;r<8;r++){for(let pi=0;pi<this.players.length;pi++){if(!this.deck.length)continue;const nc=this.deck.pop();this.players[pi].hand.push(nc);this.players[pi].hand.sort((a,b)=>a.value-b.value);const ent=new CardEntity(nc,dkR,dkY);ent.faceUp=pi===this.localPlayerIndex;ent.alpha=0;ent.scale=0.7;if(pi===this.localPlayerIndex){this.humanCards.push(ent);this.humanCards.sort((a,b)=>a.card.value-b.card.value);}else{this.aiCards.push(ent);this.aiCards.sort((a,b)=>a.card.value-b.card.value);}}this.layoutHand(this.humanCards,this.humanFaceDown,this.H-CARD_H-(IS_MOBILE?52:40));this.layoutHand(this.aiCards,this.aiFaceDown,IS_MOBILE?42:30);for(const arr of[this.humanCards,this.aiCards])for(const ent of arr)if(ent.alpha<0.5)this.tweens.add(ent,{alpha:1,scale:1},0.25,ease.outBack);await this.wait(IS_MOBILE?40:50);}await this.wait(80);this.updateSelectability();}

  // === TURNS ===
  checkTurn(){
    if(this.isProcessing)return;
    const cp=this.players[this.currentPlayerIndex];
    this.updateSelectability();

  async nextPlayer(){this.isProcessing=true;this.currentPlayerIndex=this.clockwise?(this.currentPlayerIndex+1)%this.players.length:(this.currentPlayerIndex-1+this.players.length)%this.players.length;this.updateSelectability();await this.wait(120);this.isProcessing=false;this.checkTurn();}

  // === PLAY CARD ===
  async playCard(pi,ci,fromNetwork=false){

  async afterPlay(pi,card,rel){

  // === MOJO PHASE ===

  // Reveal one card for remote player (multi — no cheat, just flip)

  rebuildVisuals(pi){const p=this.players[pi];const isLocal=pi===this.localPlayerIndex;const arr=isLocal?this.humanCards:this.aiCards;const existing=new Map();for(const ent of arr)existing.set(ent.card,ent);const newArr=[];for(const card of p.hand){if(existing.has(card)){newArr.push(existing.get(card));existing.delete(card);}else{const ent=new CardEntity(card,this.deckX,this.deckY);ent.faceUp=isLocal;ent.alpha=1;newArr.push(ent);}}if(isLocal){this.humanCards=newArr;this.layoutHand(this.humanCards,this.humanFaceDown,this.H-CARD_H-(IS_MOBILE?52:40));}else{this.aiCards=newArr;this.layoutHand(this.aiCards,this.aiFaceDown,IS_MOBILE?42:30);}}

  async endRound(wi){this.isProcessing=true;this.mojoHolder=wi;const tArr=wi===this.localPlayerIndex?this.humanCards:this.aiCards;const fArr=wi===this.localPlayerIndex?this.humanFaceDown:this.aiFaceDown;const all=[...fArr,...tArr];const tx=all.length>0?all[0].targetX-CARD_W-10:this.W/2-CARD_W/2;const ty=all.length>0?all[0].targetY:(wi===this.localPlayerIndex?this.H-CARD_H-(IS_MOBILE?52:40):(IS_MOBILE?42:30));this.info(`${this.playerNames[wi]} récupère le Mojo !`);this.particles.emit(this.mojoX+CARD_W/2,this.mojoY+CARD_H/2,12,C.accent);const omx=this.mojoX,omy=this.mojoY;await this.tweens.add(this,{mojoX:tx,mojoY:ty,mojoScale:0.8},0.5,ease.outBack);await this.wait(300);this.calcScores();if(this.shouldFlipMojo){this.info("⚠️ Pénalité Mojo : +10 !");await this.tweens.add(this,{mojoFlip:0},0.2,ease.inOutQuad);this.mojoPenalty=true;await this.tweens.add(this,{mojoFlip:1},0.2,ease.inOutQuad);this.particles.emit(this.mojoX+CARD_W/2,this.mojoY+CARD_H/2,10,C.accent2);await this.wait(300);}this.updateTotals();const ws=this.roundScores[wi].score;this.nextRoundStarter=ws===0?1-wi:wi;this.showScores();this.mojoX=omx;this.mojoY=omy;}

  updateTotals(){if(!this.totalScores.length)this.totalScores=this.players.map((p,i)=>({player:this.playerNames[i],total:this.roundScores[i].score}));else this.totalScores.forEach((t,i)=>t.total+=this.roundScores[i].score);}

  showScores(){const m=document.getElementById('scoreModal');const cm={blue:'#3b82f6',green:'#22c55e',yellow:'#eab308',red:'#ef4444',pink:'#ec4899'};let h=`<h2>📊 Scores</h2><table><tr><th>Joueur</th><th>Cartes</th><th>Score</th><th>Total</th></tr>`;this.roundScores.forEach((rs,i)=>{const cls=rs.isMojoHolder?' class="mojo-holder"':'';h+=`<tr><td${cls}>${rs.player} ${rs.isMojoHolder?'🎴':''}</td><td><div class="mini-cards">`;rs.cards.forEach(c=>{h+=`<div class="mini-card-box" style="background:${cm[c.color]}">${c.value}</div>`;});h+=`</div></td><td>${rs.score}</td><td style="font-weight:700">${this.totalScores[i].total}</td></tr>`;});h+='</table>';const mx=Math.max(...this.totalScores.map(t=>t.total));if(mx>=this.targetScore){const w=this.totalScores.reduce((m,t)=>t.total<m.total?t:m);h+=`<p>🏆 ${w.player} gagne (${w.total} pts) ! 🏆</p>`;h+=`<button class="btn btn-primary" onclick="game.newGame()">Nouvelle Partie</button>`;}else{const btnLabel=game.mode==='multi'&&game.isHost?'Manche Suivante':(game.mode==='multi'?'En attente...':'Manche Suivante');const btnAction=game.mode==='multi'&&!game.isHost?'':'onclick="game.continueRound()"';h+=`<button class="btn btn-primary" ${btnAction}>${btnLabel}</button>`;}h+='</div>';m.innerHTML=h;document.getElementById('scoreOverlay').classList.add('show');}

  pickFollowUp(remaining,topValue){const ll=remaining.filter(c=>c.value<=1).length;const eq=remaining.filter(c=>c.value===topValue);if(eq.length>0){const nl=eq.filter(c=>c.value>1);if(nl.length>0)return nl[0];if(eq[0].value<=1&&ll>=3)return eq[0];return null;}const lo=remaining.filter(c=>c.value<topValue&&c.value>1);if(lo.length>0){let best=null,bd=-Infinity;const cs=this.calcHandScore(remaining);for(const c of lo){const d=cs-this.calcScoreWithout(remaining,c);if(d>bd||(d===bd&&c.value>(best?.value??-1))){best=c;bd=d;}}return best;}return null;}

  aiChoose(hand,topCard){const humanPlayer=this.players[this.localPlayerIndex];const topVal=topCard.value,handSize=hand.length;const humanHandSize=humanPlayer.hand.length+humanPlayer.faceDownCards.length;const mojoVal=this.mojoValue;const byValue={},byColor={};for(const c of hand){byValue[c.value]=(byValue[c.value]||0)+1;(byColor[c.color]=byColor[c.color]||[]).push(c);}const lowCount=hand.filter(c=>c.value<=1).length,hasLow=lowCount>0,onlyOneLow=lowCount===1,twoLow=lowCount===2;const currentScore=this.calcHandScore(hand);const bestEnd=this.findBestEndCards(hand);const nearMojo=handSize<=4,veryNearMojo=handSize<=3;const humanNearMojo=humanHandSize<=4,humanDanger=humanHandSize<=2;const mojoWillReset=mojoVal===2,mojoRisky=mojoVal>=1;
    const candidates=hand.map((card,index)=>{let score=0;const isLow=card.value<=1;const rel=card.value<topVal?'lower':card.value>topVal?'higher':'equal';const scoreReduction=currentScore-this.calcScoreWithout(hand,card);const isEndCard=bestEnd.cards&&bestEnd.cards.includes(card);const sameCount=byValue[card.value]||0;const colorCards=byColor[card.color]||[];const combo=this.simulateCombo(hand,card,topVal);const lowPen=()=>{if(!isLow)return 0;if(onlyOneLow)return-100000;if(twoLow){let p=-40000;if(handSize===3&&rel==='lower')p+=50000;return p;}let p=-15000;if(handSize===lowCount+1&&rel==='lower')p+=20000;return p;};
      if(rel==='equal'){score+=35000;score+=combo.depth*10000;score+=combo.net*8000;score+=(currentScore-combo.scoreAfter)*500;if(sameCount>=3)score+=20000;if(sameCount>=4)score+=35000;if(sameCount>=5)score+=50000;if(card.value>=10)score+=combo.depth*6000;else if(card.value>=8)score+=combo.depth*4000;if(combo.remaining.length===0)score+=60000;else if(combo.remaining.length<=2){const e=this.calcHandScore(combo.remaining);score+=combo.remaining.every(c=>c.value<=1)?55000:(35000-e*600);}score+=lowPen();if(isEndCard&&handSize>combo.depth+2)score-=8000;if(combo.remaining.length<=2){const e=this.calcHandScore(combo.remaining);if(e<=1)score+=20000;else if(e<=3)score+=10000;}}
      else if(rel==='lower'){score+=12000;score+=scoreReduction*400;if(card.value>=10)score+=8000;else if(card.value>=8)score+=6000;else if(card.value>=5)score+=3000;if(colorCards.length===1)score+=7000+card.value*600;else{const isH=colorCards.every(c=>c.value<=card.value);if(isH)score+=5000+card.value*300;}score+=lowPen();if(isEndCard&&handSize>3)score-=8000;if(nearMojo&&!isEndCard&&!isLow)score+=5000;if(veryNearMojo&&!isEndCard&&!isLow)score+=10000;if(humanNearMojo&&!isEndCard&&!isLow)score+=6000;if(humanDanger&&!isEndCard&&!isLow)score+=12000;if(mojoWillReset)score+=3000;if(handSize-1<=2){const remain=hand.filter(c=>c!==card);const e=this.calcHandScore(remain);if(e<=1)score+=25000;else if(e<=3)score+=15000;if(e>=8)score-=10000;}}
      else{score-=4000;score+=scoreReduction*80;if(handSize<=3)score-=18000;else if(handSize<=5)score-=10000;if(nearMojo)score-=12000;if(veryNearMojo)score-=25000;if(humanNearMojo)score-=8000;if(humanDanger)score-=15000;if(!hasLow&&handSize>7)score+=5000;if(!hasLow&&handSize>5)score+=2000;if(mojoWillReset)score-=10000;if(mojoRisky)score-=5000;if(isLow)score-=120000;if(isEndCard)score-=15000;if(combo.depth>=3&&combo.net>=2){score+=combo.depth*5000+combo.net*4000;}}
      return{card,index,score,action:rel};});candidates.sort((a,b)=>b.score-a.score);return candidates[0].card;}
}
